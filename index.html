<script id="ibkr-ui-inline">

  function hasApi(){ try{ return /^https?:\/\//i.test((window.aB?window.aB():'')||''); }catch(e){ return false; } }
  function hdrs(extra){
    let h = {Accept:'application/json'};

  async function getJson(path){
    const b = window.aB ? window.aB() : '';

    const r = await fetch(b + path, {mode:'cors', cache:'no-store', headers:hdrs()});
    const ct = (r.headers.get('content-type') || '').toLowerCase();
    if (ct.includes('application/json')) return await r.json();
    throw new Error((await r.text()).slice(0,200));

  async function postJson(path, body){
    const b = window.aB ? window.aB() : '';
    if(!/^https?:\/\//i.test(b||'')) throw new Error('請先設定 API Base URL');
    const r = await fetch(b + path, {method:'POST', mode:'cors', cache:'no-store', headers:hdrs({'Content-Type':'application/json'}), body:JSON.stringify(body||{})});
    const ct = (r.headers.get('content-type') || '').toLowerCase();

<script id="auth-sync-inline">
(function () {
  if (window.__AI_TRADER_AUTH_SYNC__) return;
  window.__AI_TRADER_AUTH_SYNC__ = true;

  const LS_PREFIX = 'ait_';
  const AUTH = {
    token: loadLS('auth_token') || '',
    user: loadLS('auth_user') || null,
    syncing: false,
    suspendPush: false,
    lastSyncMsg: loadLS('auth_last_sync') || '',
    lastError: '',
    modalMode: 'login',
  };
  const ORIG = {
    aB: window.aB,
    hB: window.hB,
    ps: window.ps,
    R: window.R,
    R3: window.R3,
    cH: window.cH,
  };
  let syncTimer = null;

  function loadLS(key) {
    try {
      const raw = localStorage.getItem(LS_PREFIX + key);
      return raw ? JSON.parse(raw) : null;
    } catch (e) {
      return null;
    }
  }

  function saveLS(key, value) {
    try {
      localStorage.setItem(LS_PREFIX + key, JSON.stringify(value));
    } catch (e) {}
  }

  function syncDefaults() {
    return {
      pf: { cash: 100000, pos: [], tr: [], wl: [] },
      st: { ic: 100000, mp: 5, cp: 0.2, at: false, bth: 0.58, sth: 0.44, sa: 2.5, ta: 3.0, api: '', btd: 90, scSec: 'all', scLim: 10, uiMode: 'adaptive' },
      meta: { tab: 0, btt: 'NB', schema: 1 },
    };
  }

  function persistAuth() {
    saveLS('auth_token', AUTH.token || '');
    saveLS('auth_user', AUTH.user || null);
    saveLS('auth_last_sync', AUTH.lastSyncMsg || '');
  }

  function baseUrl() {
    let raw = '';
    try {
      if (typeof ORIG.aB === 'function') raw = String(ORIG.aB() || '').trim();
    } catch (e) {}
    raw = raw.replace(/\/+$/, '');
    if (raw) return raw;
    if (/^https?:$/i.test(location.protocol)) return location.origin.replace(/\/+$/, '');
    return '';
  }

  function hasApi() {
    return /^https?:\/\//i.test(baseUrl());
  }

  function mkHeaders(extra) {
    let h = { Accept: 'application/json' };
    try {
      if (typeof window.aHd === 'function') h = Object.assign({}, window.aHd());
    } catch (e) {}
    h.Accept = 'application/json';
    if (AUTH.token) h.Authorization = 'Bearer ' + AUTH.token;
    return Object.assign(h, extra || {});
  }

  async function apiJson(path, opt) {
    opt = opt || {};
    const b = baseUrl();
    if (!/^https?:\/\//i.test(b)) throw new Error('請先設定 API Base URL');
    const headers = mkHeaders(opt.headers || {});
    let body = opt.body;
    if (body != null && !(body instanceof FormData) && typeof body !== 'string') {
      headers['Content-Type'] = 'application/json';
      body = JSON.stringify(body);
    }
    const rsp = await fetch(b + path, {
      mode: 'cors',
      cache: 'no-store',
      method: opt.method || 'GET',
      headers,
      body,
    });
    const ct = (rsp.headers.get('content-type') || '').toLowerCase();
    let data = {};
    if (ct.includes('application/json')) data = await rsp.json();
    else data = { ok: false, error: (await rsp.text()).slice(0, 300) };
    return { rsp, data };
  }

  function currentState() {
    const d = syncDefaults();
    const S = window.S || {};
    const meta = S.meta && typeof S.meta === 'object' ? S.meta : {};
    const pf = S.pf ? Object.assign({}, S.pf) : d.pf;
    // Trim trade history to last 100 to keep payload small
    if (Array.isArray(pf.tr) && pf.tr.length > 100) pf.tr = pf.tr.slice(0, 100);
    // Trim favorites snapshots: drop heavy equity curve & price arrays
    const rawFavs = Array.isArray(meta.favorites) ? meta.favorites : [];
    const favs = rawFavs.map(function(it) {
      if (!it || !it.snapshot) return it;
      const snap = Object.assign({}, it.snapshot);
      if (snap.backtest) {
        const bt = Object.assign({}, snap.backtest);
        delete bt.eq; delete bt.lb; delete bt.pr;  // drop equity curve arrays
        snap.backtest = bt;
      }
      return Object.assign({}, it, { snapshot: snap });
    });
    return {
      pf: pf,
      st: S.st ? S.st : d.st,
      meta: {
        tab: S.tab != null ? S.tab : d.meta.tab,
        btt: S.btt || d.meta.btt,
        schema: 1,
        synced_at: new Date().toISOString(),
        favorites: favs,
      },
    };
  }

  function applyRemoteState(payload) {
    if (!window.S || !payload || typeof payload !== 'object') return;
    AUTH.suspendPush = true;
    try {
      const keepApi = window.S.st && window.S.st.api ? window.S.st.api : '';
      const keepIc = window.S.st && window.S.st.ic != null ? window.S.st.ic : 100000;
      if (payload.pf) window.S.pf = payload.pf;
      if (payload.st) window.S.st = Object.assign({}, window.S.st || syncDefaults().st, payload.st);
      if (!window.S.st.api && keepApi) window.S.st.api = keepApi;
      if (window.S.st.ic == null) window.S.st.ic = keepIc;
      if (payload.meta) {
        if (typeof payload.meta.tab === 'number') window.S.tab = payload.meta.tab;
        if (payload.meta.btt) window.S.btt = payload.meta.btt;
        // Restore favorites from cloud
        if (!window.S.meta || typeof window.S.meta !== 'object') window.S.meta = {};
        if (Array.isArray(payload.meta.favorites) && payload.meta.favorites.length > 0) {
          window.S.meta.favorites = payload.meta.favorites;
        } else if (!Array.isArray(window.S.meta.favorites)) {
          window.S.meta.favorites = [];
        }
      }
      if (typeof ORIG.ps === 'function') ORIG.ps();
      if (typeof window.uDS === 'function') window.uDS();
      if (typeof window.R === 'function') window.R();
    } finally {
      AUTH.suspendPush = false;
    }
  }

  async function pushCloudState(reason, silent) {
    if (!AUTH.user || !hasApi() || AUTH.suspendPush) return false;
    AUTH.syncing = true;
    updateAuthBadge();
    try {
      const { data } = await apiJson('/api/state', { method: 'PUT', body: { state: currentState(), reason: reason || '' } });
      if (!data.ok) throw new Error(data.message || data.error || '雲端同步失敗');
      AUTH.lastSyncMsg = '已同步 ' + new Date().toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
      AUTH.lastError = '';
      persistAuth();
      if (!silent && typeof window.ts === 'function') window.ts('已同步到雲端', 'success');
      return true;
    } catch (e) {
      AUTH.lastError = String((e && e.message) || e || 'sync_failed');
      console.error('[Auth Sync] pushCloudState failed:', e);
      if (!silent && typeof window.ts === 'function') window.ts('雲端同步失敗: ' + AUTH.lastError, 'error');
      return false;
    } finally {
      AUTH.syncing = false;
      updateAuthBadge();
      renderAuthCard();
    }
  }

  function scheduleSync(reason) {
    if (AUTH.suspendPush || !AUTH.user) return;
    clearTimeout(syncTimer);
    syncTimer = setTimeout(function () {
      pushCloudState(reason || 'auto', true);
    }, 700);
  }

  async function pullCloudState(opts) {
    opts = opts || {};
    if (!AUTH.user || !hasApi()) return false;
    AUTH.syncing = true;
    updateAuthBadge();
    try {
      const { data } = await apiJson('/api/state');
      if (!data.ok) throw new Error(data.message || data.error || '讀取雲端失敗');
      if (data.has_state && data.state) {
        applyRemoteState(data.state);
        AUTH.lastSyncMsg = '已下載雲端資料';
        AUTH.lastError = '';
        persistAuth();
        if (!opts.silent && typeof window.ts === 'function') window.ts('已從雲端載入資料', 'success');
        return true;
      }
      if (opts.seedIfEmpty !== false) {
        await pushCloudState('seed-empty-cloud', true);
      }
      return false;
    } catch (e) {
      AUTH.lastError = String((e && e.message) || e || 'pull_failed');
      console.error('[Auth Sync] pullCloudState failed:', e);
      if (!opts.silent && typeof window.ts === 'function') window.ts('雲端讀取失敗: ' + AUTH.lastError, 'error');
      return false;
    } finally {
      AUTH.syncing = false;
      updateAuthBadge();
      renderAuthCard();
    }
  }

  async function authMe(silent) {
    if (!AUTH.token || !hasApi()) return false;
    try {
      const { data } = await apiJson('/api/auth/me');
      if (!data.ok || !data.user) throw new Error(data.message || data.error || 'unauthorized');
      AUTH.user = data.user;
      AUTH.lastError = '';
      persistAuth();
      updateAuthBadge();
      return true;
    } catch (e) {
      AUTH.lastError = String((e && e.message) || e || 'auth_me_failed');
      AUTH.token = '';
      AUTH.user = null;
      persistAuth();
      updateAuthBadge();
      renderAuthCard();
      if (!silent && typeof window.ts === 'function') window.ts('登入已失效，請重新登入', 'error');
      return false;
    }
  }

  async function authLogin(username, password) {
    const { data } = await apiJson('/api/auth/login', { method: 'POST', body: { username, password } });
    if (!data.ok || !data.token || !data.user) throw new Error(data.message || data.error || '登入失敗');
    AUTH.token = data.token;
    AUTH.user = data.user;
    AUTH.lastError = '';
    AUTH.lastSyncMsg = '登入成功';
    persistAuth();
    await pullCloudState({ silent: true, seedIfEmpty: true });
    updateAuthBadge();
    renderAuthCard();
    if (typeof window.ts === 'function') window.ts('登入成功，已啟用跨裝置同步', 'success');
    return true;
  }

  async function authRegister(username, password, email) {
    const { data } = await apiJson('/api/auth/register', { method: 'POST', body: { username, password, email } });
    if (!data.ok || !data.token || !data.user) throw new Error(data.message || data.error || '註冊失敗');
    AUTH.token = data.token;
    AUTH.user = data.user;
    AUTH.lastError = '';
    AUTH.lastSyncMsg = '註冊成功';
    persistAuth();
    await pushCloudState('first-register-seed', true);
    updateAuthBadge();
    renderAuthCard();
    if (typeof window.ts === 'function') window.ts('帳號已建立，雲端同步已啟用', 'success');
    return true;
  }

  async function authLogout() {
    try {
      if (hasApi() && AUTH.token) await apiJson('/api/auth/logout', { method: 'POST' });
    } catch (e) {}
    AUTH.token = '';
    AUTH.user = null;
    AUTH.lastSyncMsg = '';
    AUTH.lastError = '';
    persistAuth();
    updateAuthBadge();
    renderAuthCard();
    if (typeof window.ts === 'function') window.ts('已登出', 'info');
  }

  function ensureAuthModal() {
    let modal = document.getElementById('authSyncModal');
    if (!modal) {
      modal = document.createElement('div');
      modal.id = 'authSyncModal';
      modal.className = 'mdl';
      modal.style.display = 'none';
      document.body.appendChild(modal);
    }
    return modal;
  }

  function closeAuthModal() {
    const modal = ensureAuthModal();
    modal.style.display = 'none';
  }

  function openAuthModal(mode) {
    AUTH.modalMode = mode === 'register' ? 'register' : 'login';
    const isRegister = AUTH.modalMode === 'register';
    const modal = ensureAuthModal();
    modal.innerHTML = [
      '<div style="max-width:460px;margin:0 auto;padding:18px 16px 28px">',
      '<div class="cd" style="margin-top:40px">',
      '<div class="fb" style="margin-bottom:12px"><div style="font-size:20px;font-weight:800">' + (isRegister ? '建立帳號' : '登入帳號') + '</div><button onclick="closeAuthSyncModal()" style="background:none;border:none;color:var(--blue);font-size:16px;cursor:pointer">關閉</button></div>',
      '<div style="font-size:12px;color:var(--text2);line-height:1.7;margin-bottom:12px">登入後，持倉、設定、通知與回測偏好會同步到後端 SQLite，手機和電腦看同一份資料。</div>',
      '<input id="authUserInput" class="ip" style="margin-top:8px" placeholder="帳號 / Email">',
      (isRegister ? '<input id="authEmailInput" class="ip" style="margin-top:8px" placeholder="Email（選填）">' : ''),
      '<input id="authPassInput" type="password" class="ip" style="margin-top:8px" placeholder="密碼（至少 6 碼）">',
      '<div id="authSyncErr" style="display:none;margin-top:10px;font-size:12px;color:var(--red)"></div>',
      '<button class="bt bt-bl" style="margin-top:14px" onclick="submitAuthSyncForm()">' + (isRegister ? '註冊並同步' : '登入並同步') + '</button>',
      '<button class="bs" style="margin-top:10px;background:var(--card2);width:100%;padding:11px 14px" onclick="openAuthSyncModal(\'' + (isRegister ? 'login' : 'register') + '\')">' + (isRegister ? '已有帳號，改成登入' : '還沒有帳號，建立新帳號') + '</button>',
      '</div></div>'
    ].join('');
    modal.style.display = 'block';
  }

  async function submitAuthForm() {
    const userEl = document.getElementById('authUserInput');
    const emailEl = document.getElementById('authEmailInput');
    const passEl = document.getElementById('authPassInput');
    const errEl = document.getElementById('authSyncErr');
    const username = (userEl && userEl.value || '').trim();
    const email = (emailEl && emailEl.value || '').trim();
    const password = (passEl && passEl.value || '');
    if (!username || password.length < 6) {
      if (errEl) {
        errEl.style.display = 'block';
        errEl.textContent = '請輸入帳號，密碼至少 6 碼';
      }
      return;
    }
    try {
      if (AUTH.modalMode === 'register') await authRegister(username, password, email);
      else await authLogin(username, password);
      closeAuthModal();
      if (typeof window.R === 'function') window.R();
    } catch (e) {
      if (errEl) {
        errEl.style.display = 'block';
        errEl.textContent = String((e && e.message) || e || 'auth_failed');
      }
    }
  }

  function updateAuthBadge() {
    const holder = document.querySelector('.hdr-r');
    if (!holder) return;
    let btn = document.getElementById('authSyncBadge');
    if (!btn) {
      btn = document.createElement('button');
      btn.id = 'authSyncBadge';
      btn.className = 'bs';
      btn.style.background = 'var(--card2)';
      btn.style.padding = '4px 10px';
      btn.style.fontSize = '11px';
      btn.style.borderRadius = '15px';
      btn.style.cursor = 'pointer';
      btn.onclick = function () {
        if (window.S && window.S.tab !== 3 && typeof window.sT === 'function') window.sT(3);
        else if (!AUTH.user) openAuthModal('login');
      };
      holder.insertBefore(btn, holder.firstChild);
    }
    if (AUTH.user) {
      btn.textContent = AUTH.syncing ? ('同步中 · ' + AUTH.user.username) : ('雲端 · ' + AUTH.user.username);
      btn.style.background = 'rgba(52,199,89,.15)';
      btn.style.color = 'var(--green)';
    } else {
      btn.textContent = '訪客 · 登入';
      btn.style.background = 'rgba(255,149,0,.15)';
      btn.style.color = 'var(--orange)';
    }
  }

  function renderAuthCard() {
    const mount = document.getElementById('t3');
    if (!mount) return;
    const old = document.getElementById('authSyncWrap');
    if (old) old.remove();
    const el = document.createElement('div');
    el.id = 'authSyncWrap';
    const userBlock = AUTH.user
      ? '<div style="font-size:16px;font-weight:700">' + AUTH.user.username + '</div><div style="font-size:12px;color:var(--text2);margin-top:3px">' + (AUTH.user.email || '未設定 Email') + '</div>'
      : '<div style="font-size:16px;font-weight:700">尚未登入</div><div style="font-size:12px;color:var(--text2);margin-top:3px">登入後可把資料同步到 SQLite，跨手機/電腦共用。</div>';
    const syncText = AUTH.lastSyncMsg || (AUTH.user ? '已登入，等待同步' : '訪客模式');
    const errText = AUTH.lastError ? '<div style="margin-top:8px;font-size:11px;color:var(--red)">' + esc(AUTH.lastError) + '</div>' : '';
    el.innerHTML = [
      '<div class="st">帳號 / 雲端同步</div>',
      '<div class="cd">',
      '<div class="fb" style="gap:12px;align-items:flex-start">',
      '<div>' + userBlock + '</div>',
      '<span class="pl ' + (AUTH.user ? 'pl-b' : 'pl-h') + '">' + (AUTH.user ? '已登入' : '訪客') + '</span>',
      '</div>',
      '<div style="margin-top:10px;font-size:12px;color:var(--text2)">狀態：' + esc(syncText) + (AUTH.syncing ? ' · 同步中' : '') + '</div>',
      errText,
      '<div class="g2" style="margin-top:12px">',
      (AUTH.user
        ? '<button class="bs" style="background:var(--blue);padding:10px 14px" onclick="pullAuthSyncState()">下載雲端</button><button class="bs" style="background:var(--green);padding:10px 14px" onclick="pushAuthSyncState()">上傳目前資料</button>'
        : '<button class="bs" style="background:var(--blue);padding:10px 14px" onclick="openAuthSyncModal(\'login\')">登入</button><button class="bs" style="background:var(--green);padding:10px 14px" onclick="openAuthSyncModal(\'register\')">建立帳號</button>'),
      '</div>',
      '<div class="g2" style="margin-top:8px">',
      (AUTH.user
        ? '<button class="bs" style="background:var(--card2);padding:10px 14px" onclick="scheduleAuthSyncNow()">立即同步</button><button class="bs" style="background:var(--red);padding:10px 14px" onclick="logoutAuthSync()">登出</button>'
        : '<button class="bs" style="background:var(--card2);padding:10px 14px" onclick="tryAuthSyncBootstrap()">重新檢查登入</button><button class="bs" style="background:var(--card2);padding:10px 14px" onclick="clearAuthSyncLocal()">清除本機 token</button>'),
      '</div>',
      '<div style="margin-top:10px;font-size:11px;color:var(--text3);line-height:1.7">\n登入成功後，AI Trader 會把 <b>持倉 / 設定 / watchlist / 通知</b> 這類狀態同步到後端 SQLite。UI 版面仍會因螢幕寬度有些微響應式差異，但資料會保持同一份。\n</div>',
      '</div>'
    ].join('');
    mount.appendChild(el);
  }

  function esc(v) {
    return String(v == null ? '' : v).replace(/[&<>"']/g, function (c) {
      return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c] || c;
    });
  }

  async function bootstrapAuthSync(silent) {
    updateAuthBadge();
    renderAuthCard();
    if (!AUTH.token || !hasApi()) return false;
    const ok = await authMe(true);
    if (ok) {
      await pullCloudState({ silent: !!silent, seedIfEmpty: true });
      return true;
    }
    return false;
  }

  window.aB = function () { return baseUrl(); };
  window.hB = function () { return hasApi(); };
  window.ps = function () {
    if (typeof ORIG.ps === 'function') ORIG.ps();
    scheduleSync('state-change');
  };
  window.R3 = function () {
    if (typeof ORIG.R3 === 'function') ORIG.R3();
    renderAuthCard();
  };
  window.R = function () {
    if (typeof ORIG.R === 'function') ORIG.R();
    updateAuthBadge();
    if (window.S && window.S.tab === 3) renderAuthCard();
  };
  window.cH = async function (showToast) {
    if (typeof ORIG.cH === 'function') {
      const ok = await ORIG.cH(showToast);
      if (ok && AUTH.token) setTimeout(function () { bootstrapAuthSync(true); }, 120);
      return ok;
    }
    return false;
  };

  window.openAuthSyncModal = openAuthModal;
  window.closeAuthSyncModal = closeAuthModal;
  window.submitAuthSyncForm = submitAuthForm;
  window.pushAuthSyncState = function () { return pushCloudState('manual-push', false); };
  window.pullAuthSyncState = function () { return pullCloudState({ silent: false, seedIfEmpty: false }); };
  window.scheduleAuthSyncNow = function () { return pushCloudState('manual-sync-now', false); };
  window.tryAuthSyncBootstrap = function () { return bootstrapAuthSync(false); };
  window.logoutAuthSync = authLogout;
  window.clearAuthSyncLocal = function () {
    AUTH.token = '';
    AUTH.user = null;
    AUTH.lastSyncMsg = '';
    AUTH.lastError = '';
    persistAuth();
    updateAuthBadge();
    renderAuthCard();
    if (typeof window.ts === 'function') window.ts('已清除本機登入資訊', 'info');
  };

  setTimeout(function () {
    updateAuthBadge();
    renderAuthCard();
    bootstrapAuthSync(true);
  }, 120);
})();

</script>

  function cleanSymbol(v){
    let s = txt(v).toUpperCase().trim();
    if (!s) return '';

  function normalizePos(row, source){
    if (!row || typeof row !== 'object') return null;
    const ticker = cleanSymbol(pick(row, ['ticker','symbol','localSymbol','contractDesc','contract_description','contractSymbol','instrument','secSymbol','asset'], ''));
    if (!ticker) return null;
    const qty = num(pick(row, ['qty','position','pos','shares','size','quantity'], 0));
    const avg = num(pick(row, ['avg_price','avgCost','averageCost','avgPrice','costBasis','cost','averagePrice'], 0));
    const last = num(pick(row, ['last_price','marketPrice','last','price','currentPrice','markPrice'], 0));
    let mv = num(pick(row, ['market_value','marketValue','value','marketValueBase','marketValueUsd'], 0));
    let upl = num(pick(row, ['unrealized_pnl','unrealizedPnL','upl','unrealizedPNL','unrealized'], 0));
    const rpl = num(pick(row, ['realized_pnl','realizedPnL','rpl','realized'], 0));
    const chg = num(pick(row, ['change_pct','change','dp','percentChange','chgPct'], 0));
    if (!mv && qty && last) mv = qty * last;
    if (!upl && avg && last && qty) upl = (last - avg) * qty;
    const upct = avg && last ? ((last / avg) - 1) * 100 * (qty < 0 ? -1 : 1) : 0;
    const qtyOut = Math.abs(qty - Math.round(qty)) < 1e-9 ? Math.round(qty) : Number(qty.toFixed(4));
    return {
      ticker: ticker,
      qty: qtyOut,
      side: qty > 0 ? 'LONG' : (qty < 0 ? 'SHORT' : 'FLAT'),
      avg_price: Number(avg.toFixed(4)),
      last_price: Number(last.toFixed(4)),
      market_value: Number(mv.toFixed(2)),
      abs_market_value: Number(Math.abs(mv).toFixed(2)),
      unrealized_pnl: Number(upl.toFixed(2)),
      unrealized_pct: Number(upct.toFixed(2)),
      realized_pnl: Number(rpl.toFixed(2)),
      change_pct: Number(chg.toFixed(2)),
      source: source || 'ibkr',
      currency: txt(pick(row, ['currency','ccy'], 'USD')) || 'USD',

  }

    if (lt && txt(lt.action).toUpperCase() === 'SELL'){
      const sold = Math.abs(num(lt.shares, 0));
      const left = Math.abs(num(lt.position_left, 0));
      if (sold > 0 && sold + left > 0) return Math.max(0.15, Math.min(1, sold / (sold + left)));

    const tp = num(snapshot && snapshot.strategy_state && snapshot.strategy_state.topic_momentum && snapshot.strategy_state.topic_momentum.score_5, 0);

    if (!po.__autoSync || typeof po.__autoSync !== 'object') po.__autoSync = {lastAt:0, lastIntent:'', trimSignal:''};
    return po.__autoSync;
  }

  function lastAutoAt(po){
    const meta = autoMeta(po);
    const raw = num(meta.lastAt || po.ax, 0);
    return raw > 0 ? raw : 0;
  }

  function lastAutoIntent(po){
    const meta = autoMeta(po);
    return txt(meta.lastIntent || po.axIntent || '').toUpperCase();
  }

  function markAutoIntent(po, intent, at, signalKey){
    if (!po || typeof po !== 'object') return;
    const meta = autoMeta(po);
    const when = at || Date.now();
    meta.lastAt = when;
    meta.lastIntent = txt(intent).toUpperCase();
    if (signalKey) meta.trimSignal = signalKey;
    po.ax = when;
    po.axIntent = meta.lastIntent;
  }

  function strategySignalKey(snapshot){
    const st = snapshot && snapshot.strategy_state ? snapshot.strategy_state : {};
    const lt = snapshot && (snapshot.latest_trade_today || snapshot.latest_trade) ? (snapshot.latest_trade_today || snapshot.latest_trade) : {};
    const tp = st && st.topic_momentum ? st.topic_momentum : {};
    return [
      txt(st.date || ''),
      txt(st.intent || snapshot && snapshot.current_signal || '').toUpperCase(),
      txt(lt.date || lt.d || ''),
      txt(lt.action || lt.a || '').toUpperCase(),
      num(lt.shares != null ? lt.shares : lt.sh, 0),
      num(lt.position_left != null ? lt.position_left : lt.left, 0),
      num(st.trim_count, 0),
      num(tp.score_5, 0),
      (Math.round(num(st.score, 0) * 10000) / 10000)
    ].join('|');
  }

  function isIntentCooling(po, minMs){
    const lastAt = lastAutoAt(po);
    if (!lastAt) return false;
    return Date.now() - lastAt < intentCooldownMs(lastAutoIntent(po), minMs);
  }

  async function autoTradeBacktestSync(force){
    if (!window.S || !window.S.st || !window.S.st.at || !window.AT || !hasApi() || POS.stratDisabled) {
      return typeof ORIG.aTR === 'function' ? ORIG.aTR(force) : false;
    }
    const minMs = Math.max(1, Number(window.S.st.atm) || 5) * 60000;
    if (!force && window.AT.last && Date.now() - window.AT.last < minMs) return false;
    if (window.AT.run) return false;
    window.AT.run = true;
    let acted = 0;
    try{
      const trimmedThisRun = new Set();
      for (const po of [ ...(window.S.pf && Array.isArray(window.S.pf.pos) ? window.S.pf.pos : []) ]){
        if (!po || isIntentCooling(po, minMs)) continue;
        const snap = await gStrat(po.t, false);
        const intent = txt(snap && snap.strategy_state && snap.strategy_state.intent || snap && snap.current_signal).toUpperCase();
        if (!intent) continue;
        const signalKey = strategySignalKey(snap);
        if (intent === 'SELL'){
          await window.sS(po.t, 1, {mode:'AUTO', note:'回測同步 SELL'});
          const left = (window.S.pf.pos || []).find(function(x){ return x.t === po.t; });
          if (left) markAutoIntent(left, 'SELL', Date.now(), '');
          acted++;
          continue;
        }
        if (intent === 'TRIM'){
          const tickerKey = txt(po.t).toUpperCase();
          const meta = autoMeta(po);
          if (trimmedThisRun.has(tickerKey)) continue;
          if (signalKey && meta.trimSignal && meta.trimSignal === signalKey) continue;
          const sharesNow = Math.abs(num(po.sh, 0));
          if (!(sharesNow > MIN_SHARES_TO_TRIM)) continue;
          const frac = trimFractionFromStrategy(snap);
          const qty = Math.max(1, Math.min(sharesNow - 1, Math.round(sharesNow * frac)));
          if (!(qty > 0 && qty < sharesNow)) continue;
          await window.sS(po.t, qty / sharesNow, {mode:'AUTO', note:'回測同步 TRIM'});
          const left = (window.S.pf.pos || []).find(function(x){ return x.t === po.t; });
          if (left) markAutoIntent(left, 'TRIM', Date.now(), signalKey);
          trimmedThisRun.add(tickerKey);
          acted++;
          continue;
        }
        if (intent === 'ADD'){
          const pi = await window.gP(po.t);
          const budget = Math.min((window.S.pf.cash || 0) * 0.35, window.autoBudget ? window.autoBudget() : ((window.S.pf.cash || 0) * 0.06));
          const sh = pi && pi.p > 0 ? Math.max(1, Math.floor(budget / pi.p)) : 0;
          if (sh > 0 && budget > 0){
            await window.sB(po.t, sh, {mode:'AUTO', note:'回測同步 ADD'});
            const pos = (window.S.pf.pos || []).find(function(x){ return x.t === po.t; });
            if (pos) markAutoIntent(pos, 'ADD', Date.now(), '');
            acted++;
          }
        }
      }

      if ((window.S.pf.pos || []).length < (window.S.st.mp || 5) && (window.autoBudget ? window.autoBudget() : 0) > 0){
        const sec = window.S.st.scSec || 'all';
        const lim = Math.max(20, Number(window.S.st.scLim) || 20);
        const scan = await window.autoScanData(sec, lim);
        const held = new Set((window.S.pf.pos || []).map(function(x){ return x.t; }));
        const candidates = Array.isArray(scan && scan.results) ? scan.results.filter(function(r){ return !held.has(r.ticker); }).slice(0, 6) : [];
        for (const row of candidates){
          const snap = await gStrat(row.ticker, false);
          const intent = txt(snap && snap.strategy_state && snap.strategy_state.intent || snap && snap.current_signal).toUpperCase();
          if (intent !== 'BUY' && intent !== 'ADD') continue;
          const pi = await window.gP(row.ticker);
          const budget = Math.min((window.S.pf.cash || 0) * 0.35, window.autoBudget ? window.autoBudget() : ((window.S.pf.cash || 0) * 0.06));
          const sh = pi && pi.p > 0 ? Math.max(1, Math.floor(budget / pi.p)) : 0;
          if (sh > 0){
            await window.sB(row.ticker, sh, {mode:'AUTO', note:'回測同步 BUY'});
            const pos = (window.S.pf.pos || []).find(function(x){ return x.t === row.ticker; });
            if (pos) markAutoIntent(pos, 'BUY', Date.now(), '');
            acted++;
            break;
          }
        }
      }
    }catch(e){
      console.warn('auto-trade-backtest-sync', e);
    }finally{
      window.AT.last = Date.now();
      window.S.st.alr = window.AT.last;
      try{ if (typeof window.ps === 'function') window.ps(); }catch(e){}
      if ([0,3,TAB_IBKR].includes(activeTab())) render();
      window.AT.run = false;
    }
    return acted > 0;
  }

      '</div></div><span class="pl-mk">'+esc(snapshot.logic || 'run_backtest')+'</span></div>' +

  window.oPos = function(ticker, source){

    insertStrategyCard(snapshot, ctx.source);

  function bootstrap(){

      if (activeTab() === TAB_IBKR && hasApi()) loadIbkrPositions(true).then(function(){ if (activeTab() === TAB_IBKR) render(); });
    }, 120000);
    render();

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', bootstrap);
  else bootstrap();
})();

  async function fetchStrategyRoute(ticker){

  }

    return {

      latest_trade_today: null,
      metrics: {
        alpha: 0,
        win_rate: 0,
        total_trades: 0,
      },
      strategy_state: {
        ticker: ticker,
        date: d && d.dt && d.dt.length ? d.dt[d.dt.length - 1] : '',
        intent: intent,
        reason: reason,
        logic: 'local_fallback',

        market_price: px,

  async function getPlanSnapshot(ticker, force){
    ticker = cleanSymbol(ticker);
    if (!ticker) return null;
    const c = PLAN.cache[ticker];
    if (!force && c && Date.now() - c.ts < PLAN_TTL) return c.data;
    if (!force && PLAN.pending[ticker]) return PLAN.pending[ticker];
    const job = (async function(){
      let snap = await fetchStrategyRoute(ticker);
      if (!snap) snap = await buildFallbackSnapshot(ticker);
      if (snap) PLAN.cache[ticker] = {ts: Date.now(), data: snap};
      delete PLAN.pending[ticker];
      return snap;
    })().catch(function(err){
      delete PLAN.pending[ticker];
      return null;
    });
    PLAN.pending[ticker] = job;
    return job;
  }

  function trimFraction(snapshot){
    const lt = snapshot && (snapshot.latest_trade_today || snapshot.latest_trade);
    if (lt && txt(lt.action).toUpperCase() === 'SELL') {
      const sold = Math.abs(num(lt.shares, 0));
      const left = Math.abs(num(lt.position_left, 0));
      if (sold > 0 && sold + left > 0) return Math.max(0.15, Math.min(1, sold / (sold + left)));
    }
    const tp = tpScore(snapshot && snapshot.strategy_state && snapshot.strategy_state.topic_momentum);
    if (tp >= 5) return 0.25;
    if (tp >= 4) return 0.35;
    if (tp >= 3) return 0.40;
    return 0.50;
  }

  function buildPlanSummary(snapshot, actualPos, source){
    const st = snapshot && snapshot.strategy_state ? snapshot.strategy_state : {};
    const intent = txt(st.intent || snapshot && snapshot.current_signal || 'HOLD').toUpperCase() || 'HOLD';
    const routeUsed = txt(snapshot && snapshot.route_used || 'local_fallback') || 'local_fallback';
    const trusted = routeUsed === 'strategy_live';
    const topic = compactTopic(st.topic_momentum || snapshot && snapshot.topic_momentum || {});
    const stop = num(st.stop_price, 0);
    const actualHasPos = !!(actualPos && Math.abs(num(actualPos.qty, 0)) > 0);
    const expectedHasPos = !!(st.has_position || ['BUY','ADD','TRIM','HOLD_POS'].includes(intent));
    const price = actualHasPos ? num(actualPos.last_price, num(st.market_price, 0)) : num(st.market_price, 0);
    const distStop = stop > 0 && price > 0 ? ((price / stop) - 1) * 100 : null;
    let statusLabel = '等待';
    let statusCls = 'plan-neutral';
    let progress = '目前先維持觀察。';

    if (actualHasPos && !expectedHasPos) {
      statusLabel = trusted ? '不同步' : '待確認';
      statusCls = trusted ? 'plan-bad' : 'plan-watch';
      progress = trusted ? '你目前仍持有，但回測邏輯偏向空手/等待。' : '本地推估偏向空手，建議再確認一次。';
    } else if (!actualHasPos && expectedHasPos) {
      statusLabel = intent === 'BUY' || intent === 'ADD' ? '可布局' : '待布局';
      statusCls = 'plan-ok';
      progress = 'AI 偏向有倉位，你目前空手，可等待合適點位。';
    } else if (actualHasPos && intent === 'SELL') {
      statusLabel = trusted ? '應離場' : '偏弱';
      statusCls = trusted ? 'plan-bad' : 'plan-watch';
      progress = stop > 0 ? '已進入出場邏輯，風險線約 $' + fmtMoney(stop, 2) + '。' : '訊號轉弱，偏向先出場控制風險。';
    } else if (actualHasPos && intent === 'TRIM') {
      statusLabel = '先減碼';
      statusCls = 'plan-watch';
      progress = 'AI 預計先減碼約 ' + Math.round(trimFraction(snapshot) * 100) + '%，保留觀察部位。';
    } else if (actualHasPos && stop > 0 && distStop != null) {
      if (distStop < 0) {
        statusLabel = trusted ? '偏離' : '失守';
        statusCls = 'plan-bad';
        progress = '現價已低於風險線 ' + fmtMoney(Math.abs(distStop), 1) + '%，建議優先檢查。';
      } else if (distStop <= 2.5) {
        statusLabel = '警戒';
        statusCls = 'plan-watch';
        progress = '距風險線僅剩 ' + fmtMoney(distStop, 1) + '%，接近下一步動作。';
      } else {
        statusLabel = expectedHasPos ? (trusted ? '依計畫' : '大致一致') : '觀察';
        statusCls = expectedHasPos ? 'plan-ok' : 'plan-neutral';
        progress = '目前仍在安全區，距風險線 ' + fmtMoney(distStop, 1) + '%。';
      }
    } else if (!actualHasPos && !expectedHasPos) {
      statusLabel = '等待';
      statusCls = 'plan-neutral';
      progress = '目前空手，符合 AI 等待條件。';
    }

    let nextAction = '先等更明確訊號';
    if (intent === 'BUY') nextAction = '可開始分批買入';
    else if (intent === 'ADD') nextAction = '續強可考慮加碼';
    else if (intent === 'HOLD_POS') nextAction = stop > 0 ? ('續抱，守住 $' + fmtMoney(stop, 2)) : '續抱觀察';
    else if (intent === 'TRIM') nextAction = '先減碼約 ' + Math.round(trimFraction(snapshot) * 100) + '%';
    else if (intent === 'SELL') nextAction = '偏向全出，先控風險';
    else if (intent === 'COOLDOWN') nextAction = '冷卻觀察，暫不重買';
    else if (intent === 'HOLD_CASH') nextAction = '先空手，等條件轉強';

    let helper = txt(st.reason || '');
    if (!helper && intent === 'HOLD_POS' && stop > 0) helper = '若跌破 $' + fmtMoney(stop, 2) + '，AI 會偏向改成減碼或賣出。';
    if (!helper && intent === 'ADD' && stop > 0) helper = '若續強可再加碼；若失守 $' + fmtMoney(stop, 2) + ' 先停手。';
    if (!helper && intent === 'BUY' && stop > 0) helper = '進場後可用 $' + fmtMoney(stop, 2) + ' 當風險線。';
    if (!helper && intent === 'TRIM') helper = '先減碼，再觀察是否保留核心倉。';
    if (!helper && intent === 'SELL') helper = '策略重視風險控制，等待重新轉強再回來。';
    if (!helper && intent === 'COOLDOWN') helper = '目前先不要急著回補，讓訊號重新整理。';
    if (!helper && intent === 'HOLD_CASH') helper = '等待突破、分數與市場條件同時轉強。';

    return {
      ticker: txt(st.ticker || snapshot && snapshot.ticker || actualPos && actualPos.ticker || ''),
      source: source || 'ai',
      routeUsed: routeUsed,
      trusted: trusted,
      statusLabel: statusLabel,
      statusCls: statusCls,
      intent: intent,
      nextAction: nextAction,
      progress: progress,
      helper: helper,
      price: price,
      stopPrice: stop,
      topicScore: topic.score_5,
      topicLabel: topic.label,
      market: marketContextFrom(st.market_context || {}),
      metrics: snapshot && snapshot.metrics ? snapshot.metrics : {alpha:0,win_rate:0,total_trades:0},
    };
  }

  function loadingMini(card){
    let el = card.querySelector('.plan-mini');
    if (!el) {
      el = document.createElement('div');
      el.className = 'plan-mini';
      card.appendChild(el);
    }
    if (!el.dataset.loading) {
      el.dataset.loading = '1';
      el.innerHTML = '<div class="plan-load">AI 下一步讀取中…</div>';
    }
  }

  function miniPlanHtml(summary){
    return ''+
      '<div class="plan-mini">' +
        '<div class="plan-row">' +
          '<div class="plan-chip-row">' +
            intentChip(summary.intent) +
            '<span class="plan-status '+summary.statusCls+'">'+esc(summary.statusLabel)+'</span>' +
            routeChip(summary.routeUsed) +
            (summary.topicScore ? '<span class="pl '+(summary.topicScore >= 4 ? 'pl-b' : (summary.topicScore >= 3 ? 'pl-h' : 'pl-s'))+'">話題 '+esc(summary.topicScore)+'/5</span>' : '') +
          '</div>' +
          (summary.stopPrice > 0 ? '<div class="plan-kv">守 $'+fmtMoney(summary.stopPrice, 2)+'</div>' : '<div class="plan-kv">'+esc(summary.market.label)+'</div>') +
        '</div>' +
        '<div class="plan-line"><strong>AI 下一步：</strong>'+esc(summary.nextAction)+'</div>' +
        '<div class="plan-line">'+esc(summary.progress)+'</div>' +
      '</div>';
  }

  function applyMiniPlan(card, summary){
    let old = card.querySelector('.plan-mini');
    if (old) old.remove();
    const wrap = document.createElement('div');
    wrap.innerHTML = miniPlanHtml(summary);
    card.appendChild(wrap.firstChild);
  }

  function cardTicker(card){
    const onclick = txt(card && card.getAttribute && card.getAttribute('onclick'));
    const m = onclick.match(/o(?:Pos|D)\('([^']+)'/);
    return cleanSymbol(m && m[1]);
  }

  function decorateCards(selector, source){
    const cards = Array.prototype.slice.call(document.querySelectorAll(selector || ''));
    cards.forEach(function(card){
      const ticker = cardTicker(card);
      if (!ticker) return;
      loadingMini(card);
      getPlanSnapshot(ticker, false).then(function(snapshot){
        const actualPos = source === 'ibkr' ? ibkrPosition(ticker) : aiPosition(ticker);
        if (!snapshot) return;
        applyMiniPlan(card, buildPlanSummary(snapshot, actualPos, source));
      }).catch(function(){});
    });
  }

  function decorateCurrentTabs(){
    decorateCards('#t0 .cd.cd-s.pr[onclick^="oD("]', 'ai');
    decorateCards('#t5 .cd.cd-s.pr[onclick*="oPos("]', 'ibkr');
    const aiBanner = document.getElementById('aiSplitBanner');
    if (aiBanner && !aiBanner.dataset.planHintPatched) {
      aiBanner.dataset.planHintPatched = '1';
      const note = aiBanner.querySelector('.split-note');
      if (note && note.innerHTML.indexOf('AI 下一步') < 0) note.innerHTML += '<br>列表會直接顯示 <b style="color:var(--blue)">AI 下一步</b> 與 <b style="color:var(--blue)">是否照計畫進行</b>。';
    }
    const ibkrHint = document.querySelector('#t5 .ibkr-hint .split-note');
    if (ibkrHint && ibkrHint.innerHTML.indexOf('AI 下一步') < 0) ibkrHint.innerHTML += ' 現在列表也會直接顯示 <b style="color:var(--blue)">AI 下一步</b> 與 <b style="color:var(--blue)">策略同步狀態</b>。';
  }

  function detailPlanHtml(summary){
    return ''+
      '<div class="plan-detail-card" id="aiNextStepCard">' +
        '<div class="fb"><div><div style="font-size:10px;color:var(--text2)">AI 預計下一步 / 計畫檢查</div><div class="plan-chip-row" style="margin-top:6px">'+intentChip(summary.intent)+'<span class="plan-status '+summary.statusCls+'">'+esc(summary.statusLabel)+'</span>'+routeChip(summary.routeUsed)+(summary.topicScore ? '<span class="pl '+(summary.topicScore >= 4 ? 'pl-b' : (summary.topicScore >= 3 ? 'pl-h' : 'pl-s'))+'">話題 '+esc(summary.topicScore)+'/5</span>' : '')+'</div></div><span class="pl-mk">'+esc(summary.source === 'ibkr' ? 'IBKR' : 'PAPER')+'</span></div>' +
        '<div style="font-size:16px;font-weight:800;letter-spacing:-.2px;margin-top:12px">'+esc(summary.nextAction)+'</div>' +
        '<div style="font-size:12px;color:var(--text2);line-height:1.75;margin-top:8px">'+esc(summary.progress)+'</div>' +
        '<div class="plan-g3"><div class="plan-metric"><div style="font-size:10px;color:var(--text2)">停損線</div><div class="v">'+(summary.stopPrice > 0 ? ('$'+fmtMoney(summary.stopPrice, 2)) : '- ')+'</div></div><div class="plan-metric"><div style="font-size:10px;color:var(--text2)">市場</div><div class="v">'+esc(summary.market.label)+' '+(summary.market.index > 0 ? '+' : '')+esc(summary.market.index)+'</div></div><div class="plan-metric"><div style="font-size:10px;color:var(--text2)">同步來源</div><div class="v">'+esc(routeLabel(summary.routeUsed))+'</div></div></div>' +
        '<div class="plan-note">'+esc(summary.helper)+'</div>' +
      '</div>';
  }

  function insertPlanDetail(symbol, source){
    const ticker = cleanSymbol(symbol);
    if (!ticker) return;
    getPlanSnapshot(ticker, false).then(function(snapshot){
      const mdl = document.getElementById('mdl');
      const root = mdl && mdl.firstElementChild;
      if (!root) return;
      const actualPos = source === 'ibkr' ? ibkrPosition(ticker) : aiPosition(ticker);
      const summary = buildPlanSummary(snapshot, actualPos, source);
      let card = document.getElementById('aiNextStepCard');
      if (!card) {
        card = document.createElement('div');
        const anchor = document.getElementById('strategySyncCard') || document.getElementById('positionSourceBanner') || root.querySelector('.g4') || root.firstElementChild;
        if (anchor && anchor.parentNode) {
          if (anchor.nextSibling) anchor.parentNode.insertBefore(card, anchor.nextSibling);
          else anchor.parentNode.appendChild(card);
        } else {
          root.appendChild(card);
        }
      }
      card.outerHTML = detailPlanHtml(summary);
    }).catch(function(){});
  }

  const ORIG = {
    R: window.R,
    oD: window.oD,
  };

  window.R = function(){
    const out = ORIG.R ? ORIG.R.apply(this, arguments) : undefined;
    setTimeout(function(){ decorateCurrentTabs(); }, 70);
    return out;
  };

  window.oD = async function(symbol){
    const source = (window.__openPosCtx && window.__openPosCtx.source) ? window.__openPosCtx.source : (activeTab() === TAB_IBKR ? 'ibkr' : 'ai');
    const out = ORIG.oD ? await ORIG.oD.apply(this, arguments) : undefined;
    setTimeout(function(){ insertPlanDetail(symbol, source); }, 90);
    return out;
  };

  window.getPlanSnapshot = getPlanSnapshot;

  function boot(){
    ensureStyle();
    setTimeout(function(){ decorateCurrentTabs(); }, 350);
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
  else boot();
})();

  function recentVolPct(bars){
    const c = bars && Array.isArray(bars.c) ? bars.c : [];
    const n0 = c.length;
    if (n0 < 21) return 2.5;
    const rr = [];
    for (let i = n0 - 20; i < n0; i++) rr.push((c[i] / c[i - 1] - 1) * 100);
    if (typeof sd === 'function') return Math.max(0.5, sd(rr));
    const m = rr.reduce((s,v)=>s+v,0)/rr.length;
    return Math.sqrt(rr.reduce((s,v)=>s+(v-m)*(v-m),0)/rr.length);
  }

  function evalQuoteSanity(quote, bars, prior){
    const reasons = [];
    if (!quote || !quote.lv || n(quote.p,0) <= 0) reasons.push('沒有即時報價');
    if (!quote || n(quote.pc,0) <= 0) reasons.push('昨收異常');
    if (!bars || !bars.lv || !bars.c || bars.c.length < 20) reasons.push('沒有有效K線');
    if (reasons.length) return {ok:false, reasons:reasons};
    const lastClose = n(bars.c[bars.c.length - 1], n(quote.pc, quote.p));
    const vol = recentVolPct(bars);
    const dynGap = Math.max(12, Math.min(38, vol * 6));
    const devLast = Math.abs(quote.p / Math.max(lastClose, 0.0001) - 1) * 100;
    const devPrev = Math.abs(quote.p / Math.max(n(quote.pc, quote.p), 0.0001) - 1) * 100;
    const quotedChange = Math.abs(n(quote.dp, devPrev));
    const dpDiff = Math.abs(devPrev - quotedChange);
    const priorDev = prior && n(prior.p,0) > 0 ? Math.abs(quote.p / Math.max(prior.p,0.0001) - 1) * 100 : 0;
    if (devLast > dynGap && dpDiff > 6) reasons.push('報價偏離近期收盤 ' + devLast.toFixed(1) + '%');
    if (prior && n(prior.p,0) > 0 && priorDev > Math.max(8, vol * 4) && devPrev > Math.max(8, vol * 4)) reasons.push('兩次報價差異過大 ' + priorDev.toFixed(1) + '%');
    return {ok:reasons.length===0, reasons:reasons, lastClose:lastClose, vol:vol, devLast:devLast, devPrev:devPrev, dynGap:dynGap};
  }

  async function tradeGuardCheck(ticker, opt){
    opt = opt || {};
    const t = txt(ticker).toUpperCase();
    const cache = TG.cache[t];
    if (!opt.force && cache && cache.ok && nowTs() - n(cache.ts,0) < 45000) return cache;
    const out = {ok:false, ticker:t, reasons:[], warnings:[], ts:nowTs(), quote:null, bars:null, message:''};

    if (typeof hB === 'function' && hB()) {
      try {
        if (!HB || !HB.ok || nowTs() - n(HB.ts,0) > 120000) await cH(false);
      } catch(e){}
      if (HB && !HB.ok) out.reasons.push('API 未連線');
      if (typeof pS === 'function') {
        try {
          const ps = await pS(true);
          if (ps && ps.providers) {
            const pv = ps.providers;
            const quoteAny = !!((pv.ibkr&&pv.ibkr.available) || (pv.finnhub&&pv.finnhub.available));
            const barsAny = !!((pv.ibkr&&pv.ibkr.available) || (pv.twelvedata&&pv.twelvedata.available));
            if (!quoteAny) out.warnings.push('provider-status 顯示報價來源不穩');
            if (!barsAny) out.warnings.push('provider-status 顯示K線來源不穩');
          }
        } catch(e){}
      }
    }

    const prior = (typeof QC !== 'undefined' && QC[t]) ? Object.assign({}, QC[t]) : null;
    let q = await freshQuote(t);
    let b = await freshBars(t, 90);
    let sane = evalQuoteSanity(q, b, prior);
    if (!sane.ok && !out.reasons.length) {
      const q2 = await freshQuote(t);
      const sane2 = evalQuoteSanity(q2, b, q || prior);
      if (sane2.ok || (q && q2 && Math.abs(q2.p / Math.max(q.p,0.0001) - 1) * 100 <= 1.2)) {
        q = q2 || q;
        sane = sane2.ok ? sane2 : sane;
      } else {
        out.reasons = out.reasons.concat(sane2.reasons.length ? sane2.reasons : sane.reasons);
      }
    } else if (!sane.ok) {
      out.reasons = out.reasons.concat(sane.reasons);
    }

    out.quote = q;
    out.bars = b;
    if (!q || !q.lv) out.reasons.push('未取得即時報價');
    if (!b || !b.lv) out.reasons.push('未取得有效K線');
    out.ok = out.reasons.length === 0;
    out.message = out.ok ? '即時報價與K線檢查通過' : out.reasons[0];
    TG.cache[t] = out;
    return out;
  }

  function simPerf(){
    const p = (S && S.pf) ? S.pf : {cash:0,pos:[],tr:[]};
    const pos = Array.isArray(p.pos) ? p.pos : [];
    const tr = Array.isArray(p.tr) ? p.tr : [];
    let marketValue = 0;
    let unreal = 0;
    pos.forEach(po=>{
      const pi = (typeof gPS === 'function') ? gPS(po.t) : {p:n(po.ap,0)};
      const cur = n(pi.p, n(po.ap,0));
      marketValue += cur * n(po.sh,0);
      unreal += (cur - n(po.ap,0)) * n(po.sh,0);
    });
    const sells = tr.filter(x=>x && x.a === 'SELL');
    const realized = sells.reduce((s,x)=>s + n(x.pl,0), 0);
    const wins = sells.filter(x=>n(x.pl,0) > 0).length;
    const losses = sells.length - wins;
    const winRate = sells.length ? (wins / sells.length) * 100 : 0;
    const totalPnl = realized + unreal;
    const totalReturn = baseCapital() > 0 ? totalPnl / baseCapital() * 100 : 0;
    const strategyReturn = baseCapital() > 0 ? realized / baseCapital() * 100 : 0;
    const curve = [0];
    let cum = 0;
    sells.slice().reverse().forEach(x=>{ cum += n(x.pl,0); curve.push(+cum.toFixed(2)); });

    else if (Math.abs(curve[curve.length-1] - totalPnl) > 0.01) curve.push(+totalPnl.toFixed(2));
    return {marketValue:marketValue, unreal:unreal, realized:realized, totalPnl:totalPnl, totalReturn:totalReturn, strategyReturn:strategyReturn, winRate:winRate, wins:wins, losses:losses, tradeCount:sells.length, openCount:pos.length, curve:curve};
  }

<script id="ibkr-performance-inline">
(function(){
  if (window.__AI_TRADER_IBKR_PERF_PATCH__) return;
  window.__AI_TRADER_IBKR_PERF_PATCH__ = true;

  const TAB_IBKR = 5;
  const PERF = {key:'', data:null, ts:0, pending:null};

  function txt(v){ return v == null ? '' : String(v); }
  function esc(v){ return txt(v).replace(/[&<>"']/g, function(ch){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[ch] || ch; }); }
  function num(v, d){ const n = Number(v); return Number.isFinite(n) ? n : (d === undefined ? 0 : d); }
  function fmtMoney(v, d){ if (typeof window.fm === 'function') return window.fm(v, d === undefined ? 2 : d); return num(v).toFixed(d === undefined ? 2 : d); }
  function fmtPct(v, d){ return num(v).toFixed(d === undefined ? 1 : d); }
  function sign(v){ if (typeof window.sg === 'function') return window.sg(v); return num(v) >= 0 ? '+' : ''; }
  function pctColor(v){ if (typeof window.pc === 'function') return window.pc(v); return num(v) >= 0 ? 'var(--green)' : 'var(--red)'; }
  function activeTab(){ try{ return Number(window.S && window.S.tab || 0); }catch(e){ return 0; } }

  function pageData(){
    const ib = window.IB || {};
    if (ib.pos && Array.isArray(ib.pos.positions)) return ib.pos;
    if (ib.pos && ib.pos.data && Array.isArray(ib.pos.data.positions)) return ib.pos.data;
    return null;
  }

  function rowsFrom(page){
    return Array.isArray(page && page.positions) ? page.positions.filter(function(r){ return r && typeof r === 'object' && txt(r.ticker); }) : [];
  }

  function cacheKey(rows){
    return rows.map(function(r){
      return [txt(r.ticker).toUpperCase(), num(r.qty), num(r.avg_price), num(r.last_price), num(r.realized_pnl), num(r.unrealized_pnl), num(r.market_value)].join(':');
    }).join('|');
  }

  function basisForRow(row){
    const avgBasis = Math.abs(num(row.avg_price) * num(row.qty));
    if (avgBasis > 0) return avgBasis;
    const inferred = Math.abs(num(row.market_value) - num(row.unrealized_pnl));
    if (inferred > 0) return inferred;
    return Math.abs(num(row.market_value));
  }

  function cardHolder(){
    const root = document.querySelector('#t5 .fi');
    if (!root) return null;

    holder = document.createElement('div');
    holder.id = 'ibkrPerfCard';
    const firstSt = root.querySelector('.st');
    if (firstSt) root.insertBefore(holder, firstSt);
    else root.appendChild(holder);
    return holder;
  }

  function metricBar(label, value, opts){
    opts = opts || {};
    const mode = txt(opts.mode || 'signed');
    const val = num(value, 0);
    let width = 0;
    let fill = val >= 0 ? 'var(--green)' : 'var(--red)';
    if (mode === 'percent'){
      width = Math.max(0, Math.min(100, val));
      fill = opts.color || 'var(--blue)';
    } else {
      const scale = Math.max(25, Math.min(150, Math.max(Math.abs(val), Math.abs(num(opts.alt, 0)), 25)));
      width = Math.max(0, Math.min(100, Math.abs(val) / scale * 100));
    }
    return ''
      + '<div style="margin-top:8px">'
      + '<div class="fb" style="margin-bottom:4px"><span style="font-size:11px;color:var(--text2)">'+label+'</span><span style="font-size:12px;font-weight:700;color:'+pctColor(val)+'">'+(mode === 'percent' ? fmtPct(val, 1) : sign(val) + fmtPct(val, 2))+'%</span></div>'
      + '<div style="height:8px;background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden;position:relative">'
      + (mode === 'signed' ? '<div style="position:absolute;left:50%;top:0;bottom:0;width:1px;background:rgba(255,255,255,.15)"></div>' : '')
      + '<div style="position:absolute;'+(mode === 'signed' ? (val >= 0 ? 'left:50%' : 'right:50%') : 'left:0')+';top:0;bottom:0;width:'+width+'%;background:'+fill+';border-radius:999px"></div>'
      + '</div></div>';
  }

  function moneyTag(v){
    return sign(v) + '$' + fmtMoney(Math.abs(v), 0);
  }

  function setLoading(){
    const holder = cardHolder();
    if (!holder) return;
    holder.innerHTML = ''
      + '<div class="cd">'
      + '<div class="fb"><div style="font-size:12px;color:var(--text2)">IBKR \u7e3e\u6548</div><button onclick="rfIBPerf(true)" style="background:none;border:none;color:var(--blue);font-size:12px;cursor:pointer">\ud83d\udd04 \u5237\u65b0</button></div>'
      + '<div style="display:flex;align-items:center;justify-content:center;padding:24px 0"><span class="sp" style="width:24px;height:24px;border-width:3px"></span><div style="font-size:12px;color:var(--text2);margin-left:10px">\u8a08\u7b97 IBKR \u7e3e\u6548\u4e2d...</div></div>'
      + '</div>';
  }

  async function loadBars(ticker){
    try{
      if (typeof window.gSD === 'function'){
        const d = await window.gSD(ticker, 45);
        if (d && Array.isArray(d.c) && d.c.length >= 10) return d;
      }
    }catch(e){}
    try{
      if (typeof window.aF === 'function' && typeof window.hB === 'function' && window.hB()){
        const d = await window.aF('/api/bars/' + encodeURIComponent(ticker) + '?days=45');
        if (d && d.ok && Array.isArray(d.closes) && d.closes.length >= 10) return {c:d.closes, dt:d.dates || [], lv:true};
      }
    }catch(e){}
    return null;
  }

  async function computePerf(force){
    const page = pageData();
    const rows = rowsFrom(page);
    if (!rows.length) return {ok:false, empty:true, message:'\u76ee\u524d\u6c92\u6709 IBKR \u5009\u4f4d'};
    const key = cacheKey(rows);
    if (!force && PERF.data && PERF.key === key && Date.now() - PERF.ts < 60000) return PERF.data;

    const costBasis = rows.reduce(function(sum, row){ return sum + basisForRow(row); }, 0);
    const unreal = rows.reduce(function(sum, row){ return sum + num(row.unrealized_pnl); }, 0);
    const realized = rows.reduce(function(sum, row){ return sum + num(row.realized_pnl); }, 0);
    const active = rows.filter(function(row){ return Math.abs(num(row.unrealized_pnl)) > 0.01; });
    const openWins = active.filter(function(row){ return num(row.unrealized_pnl) > 0; }).length;
    const openLosses = active.filter(function(row){ return num(row.unrealized_pnl) < 0; }).length;
    const winRate = (openWins + openLosses) ? (openWins / (openWins + openLosses)) * 100 : 0;
    const holdingReturn = costBasis > 0 ? unreal / costBasis * 100 : 0;
    const hasRealized = rows.some(function(row){ return Math.abs(num(row.realized_pnl)) > 0.01; });
    const combined = unreal + (hasRealized ? realized : 0);
    const ibkrReturn = costBasis > 0 ? combined / costBasis * 100 : holdingReturn;
    const marketValue = rows.reduce(function(sum, row){ return sum + num(row.market_value); }, 0);
    const cash = num(page && page.cash, 0);
    const equity = num(page && page.equity, cash + marketValue) || (cash + marketValue);

    let curve = [];
    let label = '\u73fe\u6709\u6301\u5009 P/L \u5feb\u7167';
    let note = '\u4ee5\u76ee\u524d\u6301\u80a1\u6578\u8207\u5747\u50f9\u56de\u63a8\u8fd1 30 \u65e5 P/L';
    try{
      const barsList = await Promise.all(rows.map(function(row){ return loadBars(txt(row.ticker).toUpperCase()); }));
      const usable = [];
      for (let i = 0; i < barsList.length; i++){
        const bars = barsList[i];
        if (bars && Array.isArray(bars.c) && bars.c.length >= 10) usable.push({bars:bars, row:rows[i]});
      }
      if (usable.length){
        let len = 30;
        usable.forEach(function(item){ len = Math.min(len, item.bars.c.length); });
        len = Math.max(10, Math.min(30, len));
        for (let j = 0; j < len; j++){
          let total = hasRealized ? realized : 0;
          usable.forEach(function(item){
            const closes = item.bars.c.slice(-len);
            const px = num(closes[j], num(item.row.last_price, num(item.row.avg_price)));
            total += (px - num(item.row.avg_price)) * num(item.row.qty);
          });
          curve.push(+total.toFixed(2));
        }
        label = '\u73fe\u6709\u6301\u5009\u8fd1 30 \u65e5 P/L \u5feb\u7167';
        note = '\u4ee5\u76ee\u524d\u90e8\u4f4d\u56de\u63a8\u8fd1 30 \u65e5\u6d6e\u52d5\u640d\u76ca' + (hasRealized ? '\uff0c\u4e26\u5c07\u5df2\u5be6\u73fe\u640d\u76ca\u7576\u5e38\u6578\u758a\u52a0' : '');
      }
    }catch(e){}

    if (curve.length < 2){
      curve = [0, +combined.toFixed(2)];
      label = 'IBKR \u7e3e\u6548\u5feb\u7167';
      note = '\u76ee\u524d\u62ff\u4e0d\u5230\u8db3\u5920 K \u7dda\uff0c\u5148\u986f\u793a\u7576\u524d\u7d2f\u8a08\u640d\u76ca';
    }

    const data = {
      ok:true,
      rows: rows.length,
      costBasis: costBasis,
      unreal: unreal,
      realized: realized,
      combined: combined,
      holdingReturn: holdingReturn,
      ibkrReturn: ibkrReturn,
      winRate: winRate,
      openWins: openWins,
      openLosses: openLosses,
      marketValue: marketValue,
      cash: cash,
      equity: equity,
      hasRealized: hasRealized,
      curve: curve,
      label: label,
      note: note,
    };
    PERF.key = key;
    PERF.data = data;
    PERF.ts = Date.now();
    return data;
  }

  function renderCard(perf){

      + '<div class="fc" style="gap:8px;flex-wrap:wrap;margin-top:8px"><span class="pl '+(perf.ibkrReturn >= 0 ? 'pl-b' : 'pl-s')+'">IBKR\u7e3e\u6548 '+sign(perf.ibkrReturn)+fmtPct(perf.ibkrReturn,2)+'%</span><span class="pl '+(perf.holdingReturn >= 0 ? 'pl-b' : 'pl-s')+'">\u6301\u5009\u5831\u916c '+sign(perf.holdingReturn)+fmtPct(perf.holdingReturn,2)+'%</span><span class="pl '+(perf.winRate >= 50 ? 'pl-b' : 'pl-h')+'">\u6301\u5009\u52dd\u7387 '+fmtPct(perf.winRate,1)+'%</span></div>'

      + '<div style="margin-top:12px">'
      + metricBar('\u6301\u5009\u52dd\u7387', perf.winRate, {mode:'percent', color:'var(--blue)'})
      + metricBar('\u6301\u5009\u5831\u916c', perf.holdingReturn, {mode:'signed', alt:perf.ibkrReturn})
      + metricBar('IBKR\u7e3e\u6548', perf.ibkrReturn, {mode:'signed', alt:perf.holdingReturn})
      + '</div>'
      + '<div style="margin-top:12px;padding-top:12px;border-top:.5px solid var(--border);font-size:11px;color:var(--text2)">'+esc(perf.note)+'\u3002\u57fa\u6e96\u6210\u672c $'+fmtMoney(perf.costBasis,0)+' \u00b7 \u73fe\u5728\u6b0a\u76ca $'+fmtMoney(perf.equity,0)+'</div>'
      + '</div>';
  }

  async function refresh(force){
    if (activeTab() !== TAB_IBKR) return;
    if (!cardHolder()) return;
    setLoading();
    try{
      const perf = await computePerf(!!force);
      renderCard(perf);

      renderCard({empty:true, message:'IBKR \u7e3e\u6548\u8a08\u7b97\u5931\u6557'});

  window.rfIBPerf = async function(force){
    PERF.ts = 0;
    if (force && typeof window.rfIB === 'function'){
      try{ await window.rfIB(); }catch(e){}
    }
    return refresh(true);
  };

  const _R = window.R;
  window.R = function(){
    const out = _R && _R.apply(this, arguments);
    if (activeTab() === TAB_IBKR){
      if (PERF.pending) clearTimeout(PERF.pending);
      PERF.pending = setTimeout(function(){ refresh(false); }, 60);

    return out;

  if (activeTab() === TAB_IBKR) setTimeout(function(){ refresh(false); }, 120);
})();

    const tbar = document.querySelector('.tbar');
    if (!tbar) return;
    const items = [
      {tab:TAB_IBKR, label:'持倉', icon:iconHold()},
      {tab:0, label:'AI模擬', icon:iconAi()},
      {tab:1, label:'選股', icon:iconScan()},

  function syncNav(){
    document.querySelectorAll('.tb').forEach(function(el){ el.classList.toggle('on', Number(el.dataset.tab) === activeTab()); });
    document.querySelectorAll('.tc').forEach(function(el){
      const n = Number(txt(el.id).replace(/^t/, ''));
      el.classList.toggle('on', n === activeTab());
    });

  function favoriteTickers(){
    try{
      if (typeof window.favList === 'function'){
        const rows = window.favList();
        return uniq((rows || []).map(function(x){ return txt(x && (x.ticker || x.id)); }));
      }
    }catch(e){}
    try{
      const rows = window.S && window.S.meta && Array.isArray(window.S.meta.favorites) ? window.S.meta.favorites : [];
      return uniq(rows.map(function(x){ return txt(x && (x.ticker || x.id)); }));
    }catch(e){ return []; }
  }

  function holdingTickers(){
    const out = [];
    try{
      const rows = window.S && window.S.pf && Array.isArray(window.S.pf.pos) ? window.S.pf.pos : [];
      rows.forEach(function(x){ out.push(txt(x && (x.t || x.ticker))); });
    }catch(e){}
    try{
      const rows = window.IB && window.IB.pos && Array.isArray(window.IB.pos.positions) ? window.IB.pos.positions : [];
      rows.forEach(function(x){ out.push(txt(x && (x.ticker || x.symbol || x.localSymbol))); });
    }catch(e){}
    return uniq(out);
  }

  function scopeCount(layout, key){
    const rows = layout && Array.isArray(layout.tabs) ? layout.tabs : [];
    const hit = rows.find(function(x){ return txt(x.key) === txt(key); });
    return hit ? num(hit.count, 0) : 0;
  }

  function params(){
    const p = new URLSearchParams();
    p.set('sector', txt(window.S && window.S.st && window.S.st.scSec || 'all') || 'all');
    p.set('limit', '8');
    const favs = favoriteTickers();
    const holds = holdingTickers();
    if (favs.length) p.set('favorites', favs.join(','));
    if (holds.length) p.set('holdings', holds.join(','));
    return p;
  }

  async function loadNewsPage(force){
    if (!hasApi()){
      NEWS.error = '請先設定 API Base URL';
      NEWS.data = null;
      return null;
    }
    if (!force && NEWS.data && Date.now() - NEWS.ts < NEWS_TTL) return NEWS.data;
    if (NEWS.loading) return NEWS.data;
    NEWS.loading = true; NEWS.error = '';
    const q = params().toString();
    try{
      let page = null;
      try{
        page = await window.aF('/api/news/page?' + q);
      }catch(e){ page = null; }
      if (!(page && page.ok)){
        const dash = await window.aF('/api/news/dashboard?' + q);
        const scopes = ['market','focused','favorites','holdings'];
        const feeds = {};
        await Promise.all(scopes.map(async function(scope){
          try{ const d = await window.aF('/api/news/feed?' + q + '&scope=' + scope); feeds[scope] = d.items || []; }
          catch(e){ feeds[scope] = []; }
        }));
        page = {ok:true, generated_at:dash.generated_at, dashboard:dash.dashboard || {}, focus:dash.focus || {}, layout:dash.layout || {}, feeds:feeds};
      }
      NEWS.data = page;
      NEWS.ts = Date.now();
      return page;
    }catch(e){
      NEWS.error = txt(e && e.message || e) || 'news_load_failed';
      return null;
    }finally{
      NEWS.loading = false;
    }
  }

  function toneColor(tone){
    tone = txt(tone);
    if (tone === 'up') return 'var(--green)';
    if (tone === 'down') return 'var(--red)';
    return 'var(--text2)';
  }

  function impactChip(item){
    const impact = txt(item && item.impact);
    const label = txt(item && item.impact_label || '中性');
    const cls = impact === 'bullish' ? 'pl-b' : (impact === 'bearish' ? 'pl-s' : 'pl-h');
    return '<span class="pl '+cls+'">'+esc(label)+'</span>';
  }

  function renderIndicators(indicators){
    const rows = Array.isArray(indicators) ? indicators : [];
    if (!rows.length) return '';
    return '<div class="news-strip">' + rows.map(function(it){
      return '<div class="news-ind">' +
        '<div class="lb">'+esc(it.label || '')+'</div>' +
        '<div class="vl" style="color:'+toneColor(it.tone)+'">'+esc(it.display || '')+'</div>' +
        '<div class="sm" style="color:'+toneColor(it.tone)+'">'+(num(it.change,0) ? (sign(it.change)+fmt(it.change,1)+'%') : (esc(it.hint || '')))+'</div>' +
      '</div>';
    }).join('') + '</div>';
  }

  function renderKeywordChips(list){
    const rows = Array.isArray(list) ? list : [];
    return '<div class="news-chip-row">' + rows.map(function(it){
      return '<span class="news-chip on">'+esc(it.label || '')+(num(it.count,0) ? ' · '+esc(num(it.count,0)) : '')+'</span>';

  function renderScopeTabs(layout){
    const tabs = Array.isArray(layout && layout.tabs) ? layout.tabs : [
      {key:'market', label:'市場總覽'},

      {key:'favorites', label:'我的最愛'},

      return '<button class="bs '+(on ? 'news-chip on' : '')+'" style="background:'+(on?'rgba(10,132,255,.15)':'var(--card2)')+';padding:8px 12px" onclick="newsSetScope(\''+esc(tab.key)+'\')">'+esc(tab.label || '')+' '+(num(tab.count,0)?('('+num(tab.count,0)+')'):'')+'</button>';

  function newsMetaRow(item){
    const tags = Array.isArray(item && item.tags) ? item.tags : [];

  function renderFeed(scope, items, focus){
    const rows = Array.isArray(items) ? items : [];
    const labelMap = {market:'市場總覽', focused:'聚焦追蹤', favorites:'我的最愛', holdings:'持倉連動'};
    let h = '<div class="st">'+esc(labelMap[scope] || '新聞')+'</div>';
    if (scope !== 'market'){
      const chips = [];
      if (focus && Array.isArray(focus.tickers)) chips.push.apply(chips, focus.tickers.slice(0,8));
      if (focus && Array.isArray(focus.sector_labels)) chips.push.apply(chips, focus.sector_labels.slice(0,3));
      if (chips.length){
        h += '<div style="padding:0 16px 10px">'+chips.map(function(x){ return '<span class="news-chip" style="margin-right:6px">'+esc(x)+'</span>'; }).join('')+'</div>';
      }
    }
    if (!rows.length){
      return h + '<div class="cd news-empty"><div style="font-size:34px;margin-bottom:8px">📰</div><div>目前沒有可顯示的'+esc(labelMap[scope] || '新聞')+'</div><div style="font-size:12px;margin-top:6px">可先加入最愛或等待後端整理最新 feed。</div></div>';
    }
    rows.forEach(function(item){
      const canOpen = !!txt(item && item.url);
      h += '<div class="cd cd-s pr">' +
        '<div class="fb" style="gap:10px;align-items:flex-start">' +
          '<div style="flex:1">' +
            newsMetaRow(item) +
            '<div class="news-card-title" style="margin-top:8px">'+esc(item.title || '')+'</div>' +
            (txt(item.summary) ? '<div class="news-card-sub">'+esc(item.summary)+'</div>' : '') +
            (txt(item.reason) ? '<div class="news-card-reason">'+esc(item.reason)+'</div>' : '') +
          '</div>' +
          (canOpen ? '<button class="bs" style="background:var(--blue);padding:8px 12px;white-space:nowrap" onclick="newsOpenUrl(\''+esc(txt(item.url).replace(/'/g, '%27'))+'\')">開啟</button>' : '') +
        '</div>' +
      '</div>';
    });
    return h;
  }

  function renderPage(){
    const el = document.getElementById('t6');
    if (!el) return;
    syncNav();
    if (!hasApi()){
      el.innerHTML = '<div class="fi"><div class="st">新聞</div><div class="cd news-empty"><div style="font-size:34px;margin-bottom:8px">🛰️</div><div>請先設定後端 API Base URL</div><div style="font-size:12px;margin-top:6px">新聞頁會讀取 /api/news/page，並連動持倉與我的最愛。</div><div class="g2" style="margin-top:12px"><button class="bs" style="background:var(--blue);padding:10px 14px" onclick="sT(3)">前往設定</button><button class="bs" style="background:var(--card2);padding:10px 14px" onclick="newsRefresh()">重新整理</button></div></div></div>';

      el.innerHTML = '<div class="fi"><div class="cd" style="text-align:center;padding:40px"><span class="sp" style="width:28px;height:28px;border-width:3px"></span><div style="font-size:12px;color:var(--text2);margin-top:12px">整理 AI Trader 新聞頁中...</div></div></div>';

    const data = NEWS.data || {};

    const feeds = data.feeds || {};
    const indicators = Array.isArray(dash.indicators) ? dash.indicators : [];
    const keywords = Array.isArray(dash.keywords) ? dash.keywords : [];

    const sentiment = num(dash.sentiment_index_100, 50);

    let h = '<div class="fi">';

      '<div class="fb" style="gap:10px;align-items:flex-start"><div><div style="font-size:12px;color:var(--text2)">全大盤情緒指標</div><div style="font-size:34px;font-weight:800;letter-spacing:-1.2px">'+sentiment+'<span style="font-size:18px;color:var(--text2)">/100</span></div></div><div class="fc" style="gap:8px;align-items:center"><span class="pl '+(sentiment >= 60 ? 'pl-b' : (sentiment <= 40 ? 'pl-s' : 'pl-h'))+'">'+esc(dash.sentiment_label || '中性')+'</span><button class="bs" style="background:var(--card2);padding:8px 12px" onclick="newsRefresh()">刷新</button></div></div>' +

  window.newsSetScope = function(scope){ NEWS.scope = txt(scope || 'market') || 'market'; renderPage(); };
  window.newsRefresh = function(){ NEWS.ts = 0; NEWS.data = null; NEWS.error = ''; renderPage(); loadNewsPage(true).then(function(){ if (activeTab() === TAB_NEWS) window.R(); }); };
  window.newsOpenUrl = function(url){ const raw = txt(url).replace(/%27/g, "'"); if (!raw) return; try{ window.open(raw, '_blank', 'noopener'); }catch(e){ location.href = raw; } };

  const PREV_R = window.R;
  window.R = function(){
    if (activeTab() === TAB_NEWS){
      renderPage();
      return;
    }
    if (typeof PREV_R === 'function') PREV_R();
    // Re-ensure news tab exists in nav (in case another patch rebuilt it)
    const hasNewsBtn = !!document.querySelector('.tb[data-tab="6"]');
    if (!hasNewsBtn) rebuildNav();
    else syncNav();
  };

  const PREV_sT = window.sT;
  window.sT = function(i){
    if (typeof PREV_sT === 'function') return PREV_sT(i);
    if (window.S) window.S.tab = Number(i);
    window.R();
  };

  document.addEventListener('visibilitychange', function(){
    if (!document.hidden && activeTab() === TAB_NEWS && Date.now() - NEWS.ts > NEWS_TTL) {
      loadNewsPage(true).then(function(){ if (activeTab() === TAB_NEWS) window.R(); });
    }
  });
